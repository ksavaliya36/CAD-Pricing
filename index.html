<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="CAD Pricing" />
<meta name="theme-color" content="#0B0F14" />
<title>CAD Pricing — Prime Wholesale</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  @keyframes spin    { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes fadeIn  { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #0B0F14; min-height: 100vh; min-height: 100dvh; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif; color: #fff;
    padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
  input, button, select { font-family: inherit; }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  input::placeholder { color: #4B5260; }
  button { cursor: pointer; }
  .fade-in { animation: fadeIn 0.3s ease; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ── Constants ──────────────────────────────────────────────────────────────
const METAL_FALLBACK = { "10K Gold": 83, "14K Gold": 110, "18K Gold": 140, "925 Silver": 10 };
const KARAT_PURITY   = { "10K Gold": 10/24, "14K Gold": 14/24, "18K Gold": 18/24, "925 Silver": 0.925 };
const SUGGESTED_LIST = [
  { name: "10K Gold",   purity: 10/24, type: "gold"   },
  { name: "14K Gold",   purity: 14/24, type: "gold"   },
  { name: "18K Gold",   purity: 18/24, type: "gold"   },
  { name: "22K Gold",   purity: 22/24, type: "gold"   },
  { name: "24K Gold",   purity: 1.0,   type: "gold"   },
  { name: "925 Silver", purity: 0.925, type: "silver" },
];
const PREMIUM_PER_OZ = 150;
const METAL_LOSS     = 0.05;
const LABOR_GOLD     = 9;
const LABOR_SILVER   = 7;
const TROY_OZ        = 31.1035;
const MM_TO_IN       = 0.03937;
const ROUND_TYPES    = {
  "Moissanite":           [10],
  "CVD Lab":              [90],
  "Natural · Single Cut": [105, 155],
  "Natural · Full Cut":   [225, 275, 325, 400],
};
const FANCY_TYPES = {
  "Moissanite":                [15],
  "CVD Lab":                   [140],
  "Natural (Modified Emerald)":[450],
};
const MARKUP         = 0.18;
const QUALITY_LABELS = ["Standard","Premium","Superior","Exceptional"];

// ── Palette ────────────────────────────────────────────────────────────────
const C = {
  bg:"#0B0F14", card:"#161B23", cardBorder:"rgba(255,255,255,0.06)",
  surface:"#1E242E", surface2:"#252B36",
  text:"#FFFFFF", textSoft:"#A8AEB8", textMute:"#6B7280",
  gold:"#D4A574", goldBorder:"rgba(212,165,116,0.5)",
  divider:"rgba(255,255,255,0.05)", green:"#4CAF82",
};

// ── Helpers ────────────────────────────────────────────────────────────────
function fmt(n)  { return "$" + Number(n).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,","); }
function fmtD(n) { return Number(n).toFixed(2); }

// ── Mini components ────────────────────────────────────────────────────────
function Pill({ active, onClick, children, full }) {
  return (
    <button onClick={onClick} style={{
      padding:"10px 16px", borderRadius:12, fontSize:13, fontWeight:500,
      border: active ? `1px solid ${C.gold}` : "1px solid transparent",
      background: active ? "transparent" : C.surface2,
      color: active ? C.gold : C.textSoft,
      transition:"all 0.18s", flex: full ? 1 : "0 1 auto",
      textAlign:"center", whiteSpace:"nowrap",
    }}>{children}</button>
  );
}

function Card({ children, style }) {
  return (
    <div className="fade-in" style={{
      background:C.card, border:`1px solid ${C.cardBorder}`,
      borderRadius:18, padding:18, marginBottom:14, ...style,
    }}>{children}</div>
  );
}

function FieldLabel({ children }) {
  return <p style={{ fontSize:11, fontWeight:600, color:C.textMute, letterSpacing:"0.12em", textTransform:"uppercase", margin:"0 0 8px" }}>{children}</p>;
}

// ── Main App ───────────────────────────────────────────────────────────────
function App() {
  // API key
  const [apiKey,       setApiKey]       = useState(() => localStorage.getItem("pw_api_key") || "");
  const [showKeyInput, setShowKeyInput] = useState(() => !localStorage.getItem("pw_api_key"));

  // Spot prices
  const [metalPrices,  setMetalPrices]  = useState(METAL_FALLBACK);
  const [spotGold,     setSpotGold]     = useState(null);
  const [spotSilver,   setSpotSilver]   = useState(null);
  const [priceStatus,  setPriceStatus]  = useState("loading");
  const [priceTime,    setPriceTime]    = useState(null);
  const [showSuggested,setShowSuggested]= useState(false);

  // Image / extraction
  const [image,      setImage]      = useState(null);
  const [imageB64,   setImageB64]   = useState(null);
  const [imageMime,  setImageMime]  = useState("image/jpeg");
  const [loading,    setLoading]    = useState(false);
  const [error,      setError]      = useState("");
  const [extracted,  setExtracted]  = useState(null);
  const [editGrams,  setEditGrams]  = useState("");
  const [editRound,  setEditRound]  = useState("");
  const [editFancy,  setEditFancy]  = useState("");
  const [editDims,   setEditDims]   = useState({ l: null, w: null, h: null });

  // Pricing selections
  const [metal,     setMetal]     = useState(null);
  const [roundType, setRoundType] = useState("Natural · Full Cut");
  const [roundPPC,  setRoundPPC]  = useState(225);
  const [fancyType, setFancyType] = useState(null);
  const [fancyPPC,  setFancyPPC]  = useState(null);

  const fileRef = useRef();

  // Derived
  const hasRound    = parseFloat(editRound) > 0;
  const hasFancy    = parseFloat(editFancy) > 0;
  const hasDims     = editDims.l || editDims.w || editDims.h;
  const showConfig  = extracted !== null;
  const roundReady  = !hasRound || (roundType && roundPPC);
  const fancyReady  = !hasFancy || (fancyType && fancyPPC);
  const showSummary = showConfig && metal && roundReady && fancyReady;

  const metalPPG   = metal ? metalPrices[metal] : 0;
  const grams      = parseFloat(editGrams) || 0;
  const roundCt    = parseFloat(editRound)  || 0;
  const fancyCt    = parseFloat(editFancy)  || 0;
  const subtotal   = grams * metalPPG + roundCt * (roundPPC||0) + fancyCt * (fancyPPC||0);
  const rawFinal   = subtotal * (1 + MARKUP);
  const finalPrice = rawFinal < 1500 ? Math.ceil(rawFinal/10)*10 : Math.ceil(rawFinal/50)*50;

  // ── Fetch live spot prices ─────────────────────────────────────────────
  async function fetchSpotPrices() {
    setPriceStatus("loading");
    try {
      const [goldRes, silverRes] = await Promise.all([
        fetch("https://api.gold-api.com/price/XAU"),
        fetch("https://api.gold-api.com/price/XAG"),
      ]);
      const goldData   = await goldRes.json();
      const silverData = await silverRes.json();
      const gold   = goldData.price;
      const silver = silverData.price;
      if (!gold) throw new Error("No gold price");
      const gPG = gold / TROY_OZ;
      const sPG = silver ? silver / TROY_OZ : METAL_FALLBACK["925 Silver"] / 0.925;
      setSpotGold(gold); setSpotSilver(silver || null);
      setMetalPrices({
        "10K Gold":   +((gPG * KARAT_PURITY["10K Gold"]).toFixed(2)),
        "14K Gold":   +((gPG * KARAT_PURITY["14K Gold"]).toFixed(2)),
        "18K Gold":   +((gPG * KARAT_PURITY["18K Gold"]).toFixed(2)),
        "925 Silver": +((sPG * KARAT_PURITY["925 Silver"]).toFixed(2)),
      });
      setPriceStatus("live");
      setPriceTime(new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}));
    } catch {
      setMetalPrices(METAL_FALLBACK);
      setPriceStatus("fallback");
      setSpotGold(4500);
      setSpotSilver(32);
    }
  }

  useEffect(() => { fetchSpotPrices(); }, []);

  // Suggested price = (spot + $150) × 1.05 / troy oz × purity + labor/g
  function getSuggestedPerGram(item) {
    const spot = item.type === "silver" ? spotSilver : spotGold;
    if (!spot) return null;
    const adjusted = (spot + PREMIUM_PER_OZ) * (1 + METAL_LOSS);
    const metalPerGram = (adjusted / TROY_OZ) * item.purity;
    const labor = item.type === "silver" ? LABOR_SILVER : LABOR_GOLD;
    return metalPerGram + labor;
  }

  // ── Handlers ──────────────────────────────────────────────────────────
  function handleRoundType(t) { setRoundType(t); setRoundPPC(ROUND_TYPES[t][0]); }
  function handleFancyType(t) { setFancyType(t); setFancyPPC(FANCY_TYPES[t][0]); }

  function reset() {
    setExtracted(null); setError("");
    setEditGrams(""); setEditRound(""); setEditFancy("");
    setEditDims({ l: null, w: null, h: null });
    setMetal(null); setFancyType(null); setFancyPPC(null);
  }

  function saveKey() {
    localStorage.setItem("pw_api_key", apiKey);
    setShowKeyInput(false);
  }

  function handleFile(e) {
    const file = e.target.files[0]; if (!file) return;
    reset();
    setImage(URL.createObjectURL(file));
    setImageMime(file.type || "image/jpeg");
    const reader = new FileReader();
    reader.onload = () => setImageB64(reader.result.split(",")[1]);
    reader.readAsDataURL(file);
  }

  async function analyze() {
    if (!imageB64) return;
    if (!apiKey) { setShowKeyInput(true); return; }
    setLoading(true); setError(""); reset();
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key": apiKey,
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true",
        },
        body: JSON.stringify({
          model:"claude-sonnet-4-5", max_tokens:1000,
          messages:[{ role:"user", content:[
            { type:"image", source:{ type:"base64", media_type:imageMime, data:imageB64 } },
            { type:"text", text:`Jewelry CAD spec sheet. Return ONLY valid JSON, no markdown:
{"grams":<number|null>,"metal_type":"<10K Gold|14K Gold|18K Gold|925 Silver|null>","round_carats":<number|null>,"round_type":"<Moissanite|CVD Lab|Natural · Single Cut|Natural · Full Cut|null>","fancy_carats":<number|null>,"fancy_type":"<Moissanite|CVD Lab|Natural (Modified Emerald)|null>","dimensions_mm":{"length":<number|null>,"width":<number|null>,"height":<number|null>},"notes":"<brief summary>"}
- Gram weight: grams, wt, weight, gr, g
- Metal type: 10K/14K/18K Gold or 925/Silver/Sterling
- Round carats: RD, Round, DW, R
- Round type: Moissanite(Moiss/MOI), CVD Lab(CVD/Lab/LG), Natural · Single Cut(SC), Natural · Full Cut(FC/Brilliant/Natural)
- Fancy carats: Fancy, FD, Pear, Marquise, Princess, Oval, Cushion, Emerald
- Fancy type: Moissanite, CVD Lab, Natural (Modified Emerald)
- Dimensions: look for L/W/H, length/width/height/depth values in mm
Null if not found. Numbers only for numeric fields.` }
          ]}]
        })
      });
      if (!res.ok) { const t = await res.text(); throw new Error(`API ${res.status}: ${t.slice(0,120)}`); }
      const data   = await res.json();
      const raw    = data.content.filter(b=>b.type==="text").map(b=>b.text).join("");
      const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
      setExtracted(parsed);
      setEditGrams(parsed.grams        != null ? String(parsed.grams)         : "");
      setEditRound(parsed.round_carats != null ? String(parsed.round_carats)  : "");
      setEditFancy(parsed.fancy_carats != null ? String(parsed.fancy_carats)  : "");
      if (parsed.metal_type && METAL_FALLBACK[parsed.metal_type]) setMetal(parsed.metal_type);
      if (parsed.round_type && ROUND_TYPES[parsed.round_type]) { setRoundType(parsed.round_type); setRoundPPC(ROUND_TYPES[parsed.round_type][0]); }
      if (parsed.fancy_type && FANCY_TYPES[parsed.fancy_type]) { setFancyType(parsed.fancy_type); setFancyPPC(FANCY_TYPES[parsed.fancy_type][0]); }
      // Convert dimensions from mm to inches
      const dims = parsed.dimensions_mm || {};
      const toIn = v => v != null ? (v * MM_TO_IN).toFixed(3) : null;
      setEditDims({ l: toIn(dims.length), w: toIn(dims.width), h: toIn(dims.height) });
    } catch(e) { setError(e.message || "Could not read image. Please try again."); }
    setLoading(false);
  }

  function doExport() {
    const dimStr = hasDims
      ? `\nDimensions: ${[editDims.l && `L ${editDims.l}"`, editDims.w && `W ${editDims.w}"`, editDims.h && `H ${editDims.h}"`].filter(Boolean).join(" × ")}`
      : "";
    const lines = [
      "PRIME WHOLESALE — CAD QUOTE",
      "─────────────────────────────",
      "",
      `Metal:  ${metal} · ${fmtD(grams)}g`,
      hasRound && `Round:  ${roundType} · ${fmtD(roundCt)}ct`,
      hasFancy && `Fancy:  ${fancyType} · ${fmtD(fancyCt)}ct`,
      hasDims  && `Dimensions: ${[editDims.l && `L ${editDims.l}"`, editDims.w && `W ${editDims.w}"`, editDims.h && `H ${editDims.h}"`].filter(Boolean).join(" × ")}`,
      "",
      `TOTAL:  ${fmt(finalPrice)}`,
      "",
      "Quote valid for 7 days.",
    ].filter(Boolean).join("\n");
    if (navigator.share) { navigator.share({ title:"CAD Quote", text:lines }); }
    else { navigator.clipboard.writeText(lines).then(()=>alert("Copied to clipboard!")); }
  }

  // ── Input style ────────────────────────────────────────────────────────
  const inp = {
    width:"100%", padding:"13px 14px", fontSize:15,
    color:C.text, background:C.surface, border:"none", borderRadius:12,
    outline:"none", fontWeight:500,
  };

  // ── Render ─────────────────────────────────────────────────────────────
  return (
    <div style={{ background:C.bg, padding:"20px 18px 36px", maxWidth:480, margin:"0 auto", minHeight:"100vh" }}>

      {/* API Key setup */}
      {showKeyInput && (
        <Card style={{ background:"#1F1813", borderColor:C.goldBorder }}>
          <FieldLabel><span style={{color:C.gold}}>One-time setup</span></FieldLabel>
          <p style={{ fontSize:13, color:C.textSoft, margin:"0 0 12px", lineHeight:1.55 }}>
            Paste your Anthropic API key to enable CAD image reading. Saved on this device only.
          </p>
          <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)}
            placeholder="sk-ant-api03-…" style={{...inp, marginBottom:10}} />
          <button onClick={saveKey} disabled={!apiKey} style={{
            width:"100%", padding:"13px", fontSize:14, fontWeight:600,
            color:"#1A1410", background: apiKey ? C.gold : C.textMute,
            border:"none", borderRadius:12,
          }}>Save & continue</button>
          <p style={{ fontSize:11.5, color:C.textMute, margin:"10px 0 0", lineHeight:1.5 }}>
            Get a key at <strong style={{color:C.textSoft}}>console.anthropic.com</strong> → API Keys
          </p>
        </Card>
      )}

      {/* Header */}
      <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:18, gap:10 }}>
        <div style={{ display:"flex", gap:12, alignItems:"flex-start" }}>
          <button onClick={()=>{ setImage(null); setImageB64(null); reset(); if(fileRef.current)fileRef.current.value=""; }}
            style={{ width:38, height:38, borderRadius:"50%", background:C.surface, border:"none", color:C.gold, fontSize:20, display:"flex", alignItems:"center", justifyContent:"center" }}>‹</button>
          <div>
            <h1 style={{ fontSize:26, fontWeight:700, margin:0, lineHeight:1.1, letterSpacing:"-0.02em" }}>CAD<br/>Pricing</h1>
            <p style={{ fontSize:13, color:C.textMute, margin:"4px 0 0" }}>Instant quote from design</p>
          </div>
        </div>
        <button onClick={()=>setShowKeyInput(true)} style={{
          width:36, height:36, borderRadius:"50%", background:C.surface,
          border:"none", color:C.textSoft, fontSize:16,
          display:"flex", alignItems:"center", justifyContent:"center",
        }}>⚙</button>
      </div>

      {/* Live spot price banner */}
      <div style={{
        background: priceStatus==="live" ? "rgba(76,175,130,0.08)" : "rgba(212,165,116,0.08)",
        border:`1px solid ${priceStatus==="live" ? "rgba(76,175,130,0.25)" : C.goldBorder}`,
        borderRadius:14, padding:"12px 16px", marginBottom:14,
        display:"flex", alignItems:"center", justifyContent:"space-between", gap:12,
      }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{
            width:8, height:8, borderRadius:"50%", flexShrink:0,
            background: priceStatus==="live" ? C.green : C.gold,
            boxShadow: priceStatus==="live" ? `0 0 7px ${C.green}` : "none",
          }}/>
          <div>
            <p style={{ fontSize:12.5, fontWeight:600, margin:0,
              color: priceStatus==="live" ? C.green : C.gold }}>
              {priceStatus==="loading" ? "Fetching live gold price…"
               : priceStatus==="live"  ? `Live Gold · $${spotGold?.toFixed(0)}/oz`
               : "Using estimated prices — tap ↻ to retry"}
            </p>
            {priceStatus==="live" && (
              <p style={{ fontSize:11, color:C.textMute, margin:"2px 0 0" }}>
                {spotSilver ? `Silver $${spotSilver.toFixed(2)}/oz · ` : ""}Updated {priceTime}
              </p>
            )}
          </div>
        </div>
        <button onClick={fetchSpotPrices} style={{
          width:32, height:32, borderRadius:"50%", background:C.surface,
          border:"none", color:C.textSoft, fontSize:16,
          display:"flex", alignItems:"center", justifyContent:"center",
          animation: priceStatus==="loading" ? "spin 1s linear infinite" : "none",
        }}>↻</button>
      </div>

      {/* Suggested Metal Prices dropdown */}
      {(spotGold || spotSilver) && (
        <div style={{
          background:C.card, border:`1px solid ${C.cardBorder}`,
          borderRadius:14, marginBottom:14, overflow:"hidden",
        }}>
          <button onClick={()=>setShowSuggested(!showSuggested)} style={{
            width:"100%", padding:"13px 16px", background:"transparent",
            border:"none", display:"flex", alignItems:"center",
            justifyContent:"space-between", color:C.textSoft, fontSize:13, fontWeight:500,
          }}>
            <span style={{ display:"flex", alignItems:"center", gap:8 }}>
              <span style={{color:C.gold}}>◆</span> Suggested Metal Prices
            </span>
            <span style={{ fontSize:12, color:C.textMute,
              transform: showSuggested ? "rotate(90deg)" : "rotate(0)",
              transition:"transform 0.2s" }}>▸</span>
          </button>
          {showSuggested && (
            <div className="fade-in" style={{ padding:"0 16px 14px" }}>
              <p style={{ fontSize:11, color:C.textMute, margin:"0 0 10px", lineHeight:1.5 }}>
                Spot + ${PREMIUM_PER_OZ}/oz + {(METAL_LOSS*100).toFixed(0)}% metal loss + ${LABOR_GOLD}/g labor (${LABOR_SILVER}/g for silver)
              </p>
              {SUGGESTED_LIST.map(item => {
                const p = getSuggestedPerGram(item);
                if (!p) return null;
                return (
                  <div key={item.name} style={{
                    display:"flex", justifyContent:"space-between", alignItems:"center",
                    padding:"9px 0", borderTop:`1px solid ${C.divider}`,
                  }}>
                    <span style={{ fontSize:13, color:C.textSoft }}>{item.name}</span>
                    <span style={{ fontSize:14, fontWeight:600, color:C.gold }}>
                      ${p.toFixed(2)}<span style={{ fontSize:11, color:C.textMute, fontWeight:400 }}>/g</span>
                    </span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* Upload */}
      <Card style={{ padding: image ? 14 : 18 }}>
        <FieldLabel>CAD Image</FieldLabel>
        <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{display:"none"}} />
        {!image ? (
          <div onClick={()=>fileRef.current.click()} style={{
            borderRadius:14, padding:"34px 16px", textAlign:"center",
            background:C.surface, border:`1px dashed rgba(255,255,255,0.08)`, cursor:"pointer",
          }}>
            <div style={{ fontSize:34, color:C.gold, marginBottom:10 }}>◈</div>
            <p style={{ fontSize:14.5, fontWeight:500, margin:"0 0 5px" }}>Tap to upload CAD image</p>
            <p style={{ fontSize:12, color:C.textMute, margin:0 }}>JPG, PNG, or WEBP</p>
          </div>
        ) : (
          <div>
            <img src={image} style={{ width:"100%", borderRadius:12, maxHeight:260, objectFit:"contain", display:"block", background:C.surface, marginBottom:12 }} />
            <div style={{ display:"flex", gap:10 }}>
              {!extracted && (
                <button onClick={analyze} disabled={loading} style={{
                  flex:1, padding:"14px", fontSize:14.5, fontWeight:600,
                  color:"#1A1410", background: loading ? C.textMute : C.gold,
                  border:"none", borderRadius:12,
                }}>{loading ? "Reading image…" : "Read CAD image"}</button>
              )}
              {extracted && (
                <button onClick={reset} style={{
                  flex:1, padding:"14px", fontSize:13.5, fontWeight:500,
                  color:C.textSoft, background:C.surface2, border:"none", borderRadius:12,
                }}>Re-read image</button>
              )}
              <button onClick={()=>{ setImage(null); setImageB64(null); reset(); fileRef.current.value=""; }} style={{
                padding:"14px 18px", fontSize:13.5, color:C.textMute,
                background:"transparent", border:`1px solid ${C.cardBorder}`, borderRadius:12,
              }}>Change</button>
            </div>
          </div>
        )}
        {error && <p style={{ fontSize:12.5, color:"#E89494", marginTop:10, padding:"9px 13px", background:"rgba(232,148,148,0.08)", borderRadius:8 }}>{error}</p>}
      </Card>

      {/* Step 2 — Config */}
      {showConfig && (<>
        <Card>
          <FieldLabel>Specifications</FieldLabel>
          {extracted?.notes && (
            <p style={{ fontSize:12.5, color:C.textSoft, background:C.surface, padding:"9px 13px", borderRadius:10, margin:"0 0 14px", lineHeight:1.5 }}>{extracted.notes}</p>
          )}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom: hasDims ? 12 : 0 }}>
            {[["Metal",editGrams,setEditGrams,"g"],["Round",editRound,setEditRound,"ct"],["Fancy",editFancy,setEditFancy,"ct"]].map(([lbl,v,setV,u])=>(
              <div key={lbl}>
                <p style={{ fontSize:11, color:C.textMute, margin:"0 0 6px", fontWeight:500 }}>{lbl}</p>
                <div style={{ position:"relative" }}>
                  <input type="number" value={v} onChange={e=>setV(e.target.value)} placeholder="0" step="0.01"
                    style={{...inp, paddingRight:30, fontSize:14}} />
                  <span style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", fontSize:11, color:C.textMute }}>{u}</span>
                </div>
              </div>
            ))}
          </div>
          {hasDims && (
            <div style={{ borderTop:`1px solid ${C.divider}`, paddingTop:10 }}>
              <p style={{ fontSize:11, color:C.textMute, margin:"0 0 8px", fontWeight:500 }}>Dimensions (inches)</p>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
                {[["L","l"],["W","w"],["H","h"]].map(([lbl,key]) => editDims[key] && (
                  <div key={key}>
                    <p style={{ fontSize:11, color:C.textMute, margin:"0 0 6px", fontWeight:500 }}>{lbl}</p>
                    <div style={{ position:"relative" }}>
                      <input type="number" value={editDims[key]}
                        onChange={e=>setEditDims(d=>({...d,[key]:e.target.value}))}
                        step="0.001" style={{...inp, paddingRight:22, fontSize:13}} />
                      <span style={{ position:"absolute", right:8, top:"50%", transform:"translateY(-50%)", fontSize:10, color:C.textMute }}>in</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </Card>

        <Card>
          <FieldLabel>Metal</FieldLabel>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
            {Object.keys(metalPrices).map(k=><Pill key={k} active={metal===k} onClick={()=>setMetal(k)} full>{k}</Pill>)}
          </div>
        </Card>

        {hasRound && (
          <Card>
            <FieldLabel>Round Diamonds</FieldLabel>
            <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom: roundType && ROUND_TYPES[roundType].length>1 ? 14 : 0 }}>
              {Object.keys(ROUND_TYPES).map(k=><Pill key={k} active={roundType===k} onClick={()=>handleRoundType(k)}>{k}</Pill>)}
            </div>
            {roundType && ROUND_TYPES[roundType].length>1 && (<>
              <p style={{ fontSize:11, color:C.textMute, margin:"0 0 8px", fontWeight:500 }}>Quality grade</p>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                {ROUND_TYPES[roundType].map((p,i)=><Pill key={p} active={roundPPC===p} onClick={()=>setRoundPPC(p)} full>{QUALITY_LABELS[i]}</Pill>)}
              </div>
            </>)}
          </Card>
        )}

        {hasFancy && (
          <Card>
            <FieldLabel>Fancy Diamonds</FieldLabel>
            <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
              {Object.keys(FANCY_TYPES).map(k=><Pill key={k} active={fancyType===k} onClick={()=>handleFancyType(k)}>{k}</Pill>)}
            </div>
          </Card>
        )}
      </>)}

      {/* Quote Summary */}
      {showSummary && (
        <Card style={{ padding:0, overflow:"hidden", marginTop:6 }}>
          <div style={{ padding:"16px 18px 10px", display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ color:C.gold, fontSize:13 }}>◆</span>
            <FieldLabel><span style={{color:C.gold}}>Quote Summary</span></FieldLabel>
          </div>
          <div style={{ padding:"0 18px" }}>
            {[
              [true,   "Metal",  `${metal} · ${fmtD(grams)}g`],
              [hasRound,"Round", `${roundType.replace("Natural · ","")} · ${fmtD(roundCt)}ct`],
              [hasFancy,"Fancy", `${fancyType?.replace(" (Modified Emerald)","")} · ${fmtD(fancyCt)}ct`],
              [hasDims, "Dimensions", [editDims.l&&`L ${editDims.l}"`,editDims.w&&`W ${editDims.w}"`,editDims.h&&`H ${editDims.h}"`].filter(Boolean).join(" × ")],
            ].filter(([show])=>show).map(([,lbl,val])=>(
              <div key={lbl} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 0", borderTop:`1px solid ${C.divider}` }}>
                <span style={{ color:C.textSoft, fontSize:14 }}>{lbl}</span>
                <span style={{ fontSize:14, fontWeight:500, textAlign:"right", maxWidth:"60%" }}>{val}</span>
              </div>
            ))}
          </div>
          <div style={{ background:C.surface, padding:"20px 18px", marginTop:4 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <span style={{ color:C.gold, fontSize:14, fontWeight:600 }}>Grand Total</span>
              <span style={{ color:C.gold, fontSize:34, fontWeight:700, letterSpacing:"-0.02em" }}>{fmt(finalPrice)}</span>
            </div>
          </div>
          <div style={{ padding:14, background:C.surface }}>
            <button onClick={doExport} style={{
              width:"100%", padding:"15px", fontSize:15, fontWeight:600,
              color:"#1A1410", background:C.gold, border:"none", borderRadius:14,
              display:"flex", alignItems:"center", justifyContent:"center", gap:8,
            }}><span style={{fontSize:16}}>↑</span> Export Quote</button>
          </div>
        </Card>
      )}

      <p style={{ fontSize:11, color:C.textMute, textAlign:"center", margin:"24px 0 0", letterSpacing:"0.06em" }}>
        PRIME WHOLESALE · Quote valid for 7 days
      </p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
